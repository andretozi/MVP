<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ArchiDocs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="flex items-center justify-center gap-3 mb-8">
            <i data-lucide="folder-git-2" class="w-10 h-10 text-blue-600"></i>
            <div>
                <h1 class="text-2xl font-bold text-slate-900">ArchiDocs</h1>
                <p class="text-xs text-slate-500">Gestão de Projetos</p>
            </div>
        </div>

        <form action="/dashboard" method="GET" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail Corporativo</label>
                <input type="email" value="arquiteto@empresa.com" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Senha</label>
                <input type="password" value="123456" class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition-colors mt-2">
                Entrar na Plataforma
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
